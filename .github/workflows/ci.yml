name: CI/CD Pipeline

on:
  pull_request: {branches: [main]}
  push: {branches: [main]}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install uv && uv sync --frozen
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env: {POSTGRES_PASSWORD: test, POSTGRES_DB: examiq_test}
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install uv && uv sync --frozen --extra dev
      - run: uv run pytest tests/ -v --cov=src --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost/examiq_test
          REDIS_URL: redis://localhost:6379/0
      - uses: codecov/codecov-action@v4

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env: {FLY_API_TOKEN: "${{ secrets.FLY_API_TOKEN }}"}